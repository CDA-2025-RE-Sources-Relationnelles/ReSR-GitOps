apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resr-frontoffice-web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - resr.fr
      secretName: tls-secret

  rules:
    - host: resr.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resr-frontoffice-web
                port:
                  number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resr-frontoffice-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resr-frontoffice-web
  template:
    metadata:
      labels:
        app: resr-frontoffice-web
    spec:
      containers:
        - name: resr-frontoffice-web
          image: ghcr.io/cda-2025-re-sources-relationnelles/resr-frontoffice-web:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: resr-frontoffice-web
spec:
  type: ClusterIP
  selector:
    app: resr-frontoffice-web
  ports:
    - name: http
      port: 8080
      targetPort: 3000