apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CDA-2025-RE-Sources-Relationnelles/ReSR-GitOps.git
    path: dev
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: resr-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
