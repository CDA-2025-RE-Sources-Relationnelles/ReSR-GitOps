apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resr-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.resr.fr
      secretName: tls-secret

  rules:
    - host: api.resr.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resr-api
                port:
                  number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resr-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resr-api
  template:
    metadata:
      labels:
        app: resr-api
    spec:
      containers:
        - name: resr-api
          image: ghcr.io/cda-2025-re-sources-relationnelles/resr-api@sha256:a3404645b27a8a1c00b3c5ab244bada460792de37f60e1ecfbdcb7c1b58ef913
          args: ["-n", "-d"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: resr-secret
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: resr-api
spec:
  type: ClusterIP
  selector:
    app: resr-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080