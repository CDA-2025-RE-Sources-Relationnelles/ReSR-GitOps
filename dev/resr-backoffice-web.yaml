apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resr-backoffice-web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.admin.resr.fr
      secretName: tls-secret

  rules:
    - host: admin.resr.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resr-backoffice-web
                port:
                  number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resr-backoffice-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resr-backoffice-web
  template:
    metadata:
      labels:
        app: resr-backoffice-web
    spec:
      containers:
        - name: resr-backoffice-web
          image: ghcr.io/cda-2025-re-sources-relationnelles/resr-backoffice-web@sha256:7ffb477fe2f21c18cbc3b84e27de7f483db456d1db90b5e8d4782a14d415d4b6
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: resr-backoffice-web
spec:
  type: ClusterIP
  selector:
    app: resr-backoffice-web
  ports:
    - name: http
      port: 8080
      targetPort: 3000